name: CI

on:
  push:
    branches:
      - main
      - Antoine/root-helper-proper
    paths-ignore:
      - '**/*.md'
      - 'README.md'
      - '.gitignore'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - 'README.md'
      - '.gitignore'
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: macos-14

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Procursus (Provides ldid)
        uses: beer-psi/procursus-action@v2
        with:
          packages: ldid
          cache: true
          cache-path: ~/__cache

      - name: Select Xcode 15
        run: sudo xcode-select --switch /Applications/Xcode_15.4.app || sudo xcode-select --switch /Applications/Xcode_15.0.app

      - name: Compile via Makefile
        run: |
          # 1. Create a local temporary directory inside the safe workspace container
          mkdir -p workspace_tmp
          export TMPDIR="$(pwd)/workspace_tmp"
          echo "Overriding Makefile TMPDIR path to: $TMPDIR"
          
          # 2. Fire the Makefile execution with explicitly injected environment paths
          make TMPDIR="$TMPDIR"

      - name: Upload Standard Jailed IPA
        uses: actions/upload-artifact@v4
        with:
          name: SantanderJailed
          path: build/SantanderJailed.ipa

      - name: Upload TrollStore Native TIPA
        uses: actions/upload-artifact@v4
        with:
          name: SantanderTrollStore
          path: build/SantanderTrollStore.tipa
