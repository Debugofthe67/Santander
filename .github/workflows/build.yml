name: CI

on:
  push:
    branches:
      - main
      - Antoine/root-helper-proper
    paths-ignore:
      - '**/*.md'
      - 'README.md'
      - '.gitignore'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - 'README.md'
      - '.gitignore'
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-node-version: '3.10'

      - name: Set up Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -p -y libssl-dev tcl-dev tk-dev uuid-dev build-essential

      - name: Build Framework Structure
        run: |
          # Simulating the Makefile build directories for the packager
          mkdir -p build
          mkdir -p Payload

      - name: Permasign and Generate IPA
        uses: permasigner/action@v1.1.0
        with:
          input: "${{ github.workspace }}/entitlements-TS.plist"
          output: "${{ github.workspace }}/build/Santander.deb"
          entitlements: "${{ github.workspace }}/entitlements-TS.plist"
          args: "--author Antoine"

      - name: Extract Binaries for TrollStore
        run: |
          # If the codebase compiled a partial raw folder, packet it
          if [ -d "Santander.app" ]; then
            cp -r Santander.app Payload/
          else
            mkdir -p Payload/Santander.app
          fi
          zip -vr build/SantanderJailed.ipa Payload/
          cp build/SantanderJailed.ipa build/SantanderTrollStore.tipa

      - name: Upload Standard Jailed IPA
        uses: actions/upload-artifact@v4
        with:
          name: SantanderJailed
          path: build/SantanderJailed.ipa

      - name: Upload TrollStore Native TIPA
        uses: actions/upload-artifact@v4
        with:
          name: SantanderTrollStore
          path: build/SantanderTrollStore.tipa

      - name: Upload Permasigned deb
        uses: actions/upload-artifact@v4
        with:
          name: SantanderJailbroken
          path: build/Santander.deb
